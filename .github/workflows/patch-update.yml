name: Patch Update

on:
  schedule:
    - cron: '0 2 15 * *' # 毎月15日の午前2時に実行
  workflow_dispatch: # 手動実行も可能

jobs:
  patch-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check outdated packages before update
        id: outdated-before
        run: |
          echo "## Before Update" >> $GITHUB_STEP_SUMMARY
          npm outdated --json > outdated-before.json || true
          npm outdated >> $GITHUB_STEP_SUMMARY || true

      - name: Update patch versions
        run: npm update

      - name: Check outdated packages after update
        run: |
          echo "## After Update" >> $GITHUB_STEP_SUMMARY
          npm outdated >> $GITHUB_STEP_SUMMARY || true

      - name: Run tests
        run: npm run lint

      - name: Check if there are changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): monthly patch update'
          title: 'chore(deps): 依存パッケージのパッチ更新'
          body: |
            このPRは、npm updateによって自動的に生成されました。

            ## 変更内容
            - 依存パッケージのパッチバージョンを更新

            ## 確認事項
            - [ ] アプリケーションが正常に動作することを確認してください
            - [ ] lint が通過していることを確認してください
          branch: deps/monthly-patch-update
          base: main
          labels: |
            dependencies
            automated-pr
